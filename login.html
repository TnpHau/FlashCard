<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập – FlashCard Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #0f172a;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      color: #64748b;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }
    .tab.active {
      background: #1e293b;
      color: #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 12px;
      color: #e2e8f0;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #818cf8; }
    input::placeholder { color: #2d3f55; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(129,140,248,0.35);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(129,140,248,0.5);
    }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-label">✦ Flash Card</div>
    <h1>FlashCard Pro</h1>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login"    onclick="switchTab('login')">Đăng nhập</div>
    <div class="tab"        id="tab-register" onclick="switchTab('register')">Đăng ký</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label>Tên đăng nhập</label>
    <input type="text" id="inp-username" placeholder="username"
      autocomplete="username"
      onkeydown="if(event.key==='Enter') document.getElementById('inp-password').focus()"/>
  </div>
  <div class="form-group">
    <label>Mật khẩu</label>
    <input type="password" id="inp-password" placeholder="••••••"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter') submit()"/>
  </div>

  <button class="btn-submit" id="submit-btn" onclick="submit()">Đăng nhập</button>
</div>

<script>
  if (localStorage.getItem('fc_token')) window.location.replace('index.html');

  let currentTab = 'login';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('submit-btn').textContent = tab === 'login' ? 'Đăng nhập' : 'Đăng ký';
    document.getElementById('inp-password').autocomplete =
      tab === 'login' ? 'current-password' : 'new-password';
    clearError();
    document.getElementById('inp-username').focus();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError() {
    document.getElementById('error-msg').classList.remove('show');
  }

  async function submit() {
    const username = document.getElementById('inp-username').value.trim();
    const password = document.getElementById('inp-password').value;
    if (!username || !password) { showError('Vui lòng nhập đầy đủ thông tin'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    clearError();

    try {
      const url = currentTab === 'login' ? '/api/auth/login' : '/api/auth/register';
      const res  = await fetch(url, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Có lỗi xảy ra'); return; }
      localStorage.setItem('fc_token', data.token);
      localStorage.setItem('fc_user',  data.username);
      window.location.replace('index.html');
    } catch {
      showError('Không thể kết nối đến server');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
