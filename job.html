<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flashcard Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: white;
      }

      /* CARD */
      .card {
        width: 420px;
        height: 260px;
        perspective: 1200px;
      }

      .inner {
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        position: relative;
      }

      .flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        backface-visibility: hidden;
        padding: 20px;
        text-align: center;
      }

      .front {
        font-size: 26px;
        font-weight: 600;
      }

      .back {
        transform: rotateY(180deg);
        font-size: 18px;
      }

      .ipa {
        opacity: 0.8;
        margin-bottom: 10px;
      }

      /* CONTROLS */
      .controls {
        margin-top: 25px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        margin: 5px;
        cursor: pointer;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        transition: 0.3s;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* PROGRESS */
      .progress {
        margin-bottom: 15px;
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <h2>Chủ đề: Công việc</h2>
    <div class="progress" id="progress"></div>

    <div class="card" onclick="flipCard()">
      <div class="inner" id="card">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevCard()">⬅ Prev</button>
      <button onclick="nextCard()">Next ➡</button>
      <button onclick="shuffle()">🔀 Shuffle</button>
    </div>

    <script>
      let jobs = [];
      let current = 0;

      fetch("data/jobs.json")
        .then(r => r.json())
        .then(data => {
          jobs = data;
          render();
        });

      function render() {
        document.getElementById("front").innerText = jobs[current].w;
        document.getElementById("back").innerHTML =
          `<div class="ipa">${jobs[current].ipa}</div>${jobs[current].m}`;
        document.getElementById("progress").innerText =
          `${current + 1} / ${jobs.length}`;
      }

      function flipCard() {
        document.getElementById("card").classList.toggle("flipped");
      }

      function nextCard() {
        current = (current + 1) % jobs.length;
        reset();
      }

      function prevCard() {
        current = (current - 1 + jobs.length) % jobs.length;
        reset();
      }

      function shuffle() {
        jobs.sort(() => Math.random() - 0.5);
        current = 0;
        reset();
      }

      function reset() {
        document.getElementById("card").classList.remove("flipped");
        render();
      }
    </script>
  </body>
</html>
