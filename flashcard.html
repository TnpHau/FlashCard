<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlashCard Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="utils.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c1: #667eea;
      --c2: #764ba2;
      --c3: #c084fc;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 20;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .back-link {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,0.14);
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.28); }
    .topic-label {
      font-size: 15px;
      font-weight: 600;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Color button in topbar */
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .palette-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.14);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .palette-tag:hover { background: rgba(255,255,255,0.28); }
    .btn-color {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.14);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-color:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

    /* ── Main area ── */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 88px 24px 48px;
      flex: 1;
    }

    /* ── Progress ── */
    .progress-text {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.75;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .progress-bar-track {
      width: min(440px, 90vw);
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.75);
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* ── Flashcard ── */
    .card {
      width: min(440px, 90vw);
      height: 270px;
      perspective: 1200px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow:
        0 24px 64px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .face-front .word {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    .face-front .hint {
      font-size: 12px;
      opacity: 0.55;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .face-back { transform: rotateY(180deg); }
    .face-back .ipa {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.15);
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .face-back .meaning {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.25;
      text-shadow: 0 2px 14px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 18px;
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      background: rgba(255,255,255,0.14);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      backdrop-filter: blur(8px);
    }
    .btn:hover { background: rgba(255,255,255,0.28); }
    .btn:active { transform: scale(0.96); }
    .btn-flip {
      padding: 11px 26px;
      background: rgba(255,255,255,0.22);
      font-weight: 600;
    }

    /* ── Keyboard hints ── */
    .kbd-hints {
      margin-top: 22px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 12px;
      opacity: 0.38;
    }
    .kbd-hints span { display: flex; align-items: center; gap: 4px; }
    kbd {
      background: rgba(255,255,255,0.18);
      padding: 2px 6px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 11px;
    }

    /* ── Not found ── */
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px;
      gap: 16px;
    }
    .not-found h2 { font-size: 22px; }
    .not-found a { color: white; opacity: 0.8; }

    /* ════════════════════════════════
       COLOR PICKER MODAL
    ════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      z-index: 50;
      display: flex;
      align-items: flex-end;        /* slide up from bottom */
      justify-content: center;
      padding: 0 0 0 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #1a2236;
      border: 1px solid #334155;
      border-radius: 24px 24px 0 0;
      padding: 24px 24px 36px;
      width: 100%;
      max-width: 520px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.34,1.4,.64,1);
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    /* drag handle */
    .modal-handle {
      width: 40px; height: 4px;
      background: #334155;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
    }

    /* Gradient preview strip */
    .modal-preview {
      height: 48px;
      border-radius: 12px;
      margin-bottom: 16px;
      transition: background 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      letter-spacing: 1px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    /* Palette swatches */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .pal-swatch {
      height: 44px;
      border-radius: 10px;
      cursor: pointer;
      border: 2.5px solid transparent;
      position: relative;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .pal-swatch:hover { transform: scale(1.1); }
    .pal-swatch.active {
      border-color: white;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.5), 0 4px 12px rgba(0,0,0,0.5);
      transform: scale(1.12);
    }
    .pal-swatch .tip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }
    .pal-swatch:hover .tip { display: block; }

    .modal-footer {
      display: flex;
      gap: 10px;
    }
    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #94a3b8;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: #334155; color: #e2e8f0; }
    .btn-apply {
      flex: 2;
      padding: 12px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(129,140,248,0.35);
    }
    .btn-apply:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(129,140,248,0.5);
    }
  </style>
</head>
<body>

<div id="root"></div>

<!-- Color picker modal (outside #root so it's always available) -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🎨 Đổi màu nền</div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-preview" id="modal-preview"></div>
    <div class="palette-grid" id="modal-palette-grid"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn-apply" onclick="applyColor()">✓ Áp dụng</button>
    </div>
  </div>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const topicId = params.get('id');
  let   topic   = topicId ? getTopicById(topicId) : null;

  if (!topic) {
    document.documentElement.style.setProperty('--c1', '#2c3e50');
    document.documentElement.style.setProperty('--c2', '#4568DC');
    document.documentElement.style.setProperty('--c3', '#B06AB3');
    document.getElementById('root').innerHTML = `
      <div class="not-found">
        <div style="font-size:56px">🔍</div>
        <h2>Không tìm thấy chủ đề</h2>
        <a href="index.html">← Về trang chủ</a>
      </div>`;
  } else {
    applyPalette(topic.palette);
    document.title = `${topic.name} – FlashCard Pro`;

    let deck    = [...topic.cards];
    let current = 0;

    document.getElementById('root').innerHTML = `
      <div class="topbar">
        <div class="topbar-left">
          <a class="back-link" href="index.html">←</a>
          <span class="topic-label">${escHtml(topic.name)}</span>
        </div>
        <div class="topbar-right">
          <span class="palette-tag" id="palette-tag" onclick="openModal()">${escHtml(topic.palette.name)}</span>
          <button class="btn-color" onclick="openModal()" title="Đổi màu nền">🎨</button>
        </div>
      </div>

      <div class="main">
        <div class="progress-text" id="prog-text"></div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="prog-bar"></div>
        </div>

        <div class="card" id="card" onclick="flip()">
          <div class="card-inner" id="inner">
            <div class="face face-front">
              <div class="word" id="front-word"></div>
              <div class="hint">Nhấn để xem nghĩa ↩</div>
            </div>
            <div class="face face-back">
              <div class="ipa" id="back-ipa"></div>
              <div class="meaning" id="back-meaning"></div>
            </div>
          </div>
        </div>

        <div class="controls">
          <button class="btn" onclick="prev()">← Trước</button>
          <button class="btn btn-flip" onclick="flip()">🔄 Lật thẻ</button>
          <button class="btn" onclick="next()">Tiếp →</button>
          <button class="btn" onclick="shuffleDeck()">🔀 Trộn</button>
        </div>

        <div class="kbd-hints">
          <span><kbd>←</kbd><kbd>→</kbd> Điều hướng</span>
          <span><kbd>Space</kbd> Lật thẻ</span>
          <span><kbd>S</kbd> Trộn bài</span>
        </div>
      </div>`;

    render();

    // ── Card logic ──
    function render() {
      const c = deck[current];
      document.getElementById('front-word').textContent = c.w;
      const ipaEl = document.getElementById('back-ipa');
      ipaEl.textContent = c.ipa || '';
      ipaEl.style.display = c.ipa ? '' : 'none';
      document.getElementById('back-meaning').textContent = c.m;
      const pct = ((current + 1) / deck.length * 100).toFixed(1);
      document.getElementById('prog-text').textContent = `${current + 1} / ${deck.length}`;
      document.getElementById('prog-bar').style.width = pct + '%';
    }

    function flip()   { document.getElementById('inner').classList.toggle('flipped'); }
    function unflip() { document.getElementById('inner').classList.remove('flipped'); }
    function next()   { current = (current + 1) % deck.length; unflip(); render(); }
    function prev()   { current = (current - 1 + deck.length) % deck.length; unflip(); render(); }
    function shuffleDeck() { deck.sort(() => Math.random() - 0.5); current = 0; unflip(); render(); }

    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (document.getElementById('modal-overlay').classList.contains('open')) return;
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
      else if (e.key === ' ') { e.preventDefault(); flip(); }
      else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });
  }

  // ════════════════════════════════
  // COLOR PICKER MODAL
  // ════════════════════════════════
  let selectedPalette = topic ? topic.palette : COLOR_PALETTES[0];

  function applyPalette(p) {
    document.documentElement.style.setProperty('--c1', p.c1);
    document.documentElement.style.setProperty('--c2', p.c2);
    document.documentElement.style.setProperty('--c3', p.c3 || p.c2);
  }

  function openModal() {
    selectedPalette = topic.palette;
    document.getElementById('modal-subtitle').textContent = topic.name;
    buildGrid();
    updatePreview();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function buildGrid() {
    document.getElementById('modal-palette-grid').innerHTML =
      COLOR_PALETTES.map((p, i) => `
        <div class="pal-swatch ${p.name === selectedPalette.name ? 'active' : ''}"
          style="background: ${getGradient(p)}"
          onclick="pickPalette(${i})">
          <span class="tip">${p.name}</span>
        </div>
      `).join('');
  }

  function pickPalette(i) {
    selectedPalette = COLOR_PALETTES[i];
    buildGrid();
    updatePreview();
  }

  function updatePreview() {
    const el = document.getElementById('modal-preview');
    el.style.background = getGradient(selectedPalette);
    el.textContent = selectedPalette.name;
  }

  function applyColor() {
    if (!topic || !selectedPalette) return;

    // Save to localStorage
    const topics = getTopics();
    const idx    = topics.findIndex(t => t.id === topic.id);
    if (idx !== -1) {
      topics[idx].palette    = selectedPalette;
      topics[idx].updatedAt  = Date.now();
      saveTopics(topics);
      topic = topics[idx];
    }

    // Update live background + tag
    applyPalette(selectedPalette);
    const tag = document.getElementById('palette-tag');
    if (tag) tag.textContent = selectedPalette.name;

    closeModal();
  }
</script>
</body>
</html>
